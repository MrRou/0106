<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Video Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Video Library</h1>
    <p>Click a video to stream it in the player.</p>
  </header>

  <main>
    <div id="library" class="grid"></div>
  </main>

  <div id="playerModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeBtn" class="close">✕</button>
      <div id="playerContainer"></div>
    </div>

    <div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/1197112180?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="2022 - England v Australia"></iframe></div><script src="https://player.vimeo.com/api/player.js"></script>
  </div>

  <script src="app.js"></script>
</body>
</html>
